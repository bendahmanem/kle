version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: chapitre-1-es01
    environment:
      - node.name=es01
      - cluster.name=kle-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 60
    networks:
      - kle-net

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.2
    container_name: chapitre-1-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - kle-net

  # logstash:
  #   image: docker.elastic.co/logstash/logstash:9.4.2
  #   container_name: chapitre-1-logstash
  #   volumes:
  #     - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
  #     - ./logstash/data:/usr/share/logstash/data:ro
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy
  #   networks:
  #     - kle-net

volumes:
  esdata:
    driver: local

networks:
  kle-net:
    driver: bridge